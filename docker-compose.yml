services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: playfast
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-playfast_secret_2026}
      POSTGRES_DB: playfast
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - playfast
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U playfast"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://playfast:${POSTGRES_PASSWORD:-playfast_secret_2026}@postgres:5432/playfast
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-production-please}
      FLASK_ENV: production
      FRONTEND_URL: https://playfast.id
      MIDTRANS_SERVER_KEY: ${MIDTRANS_SERVER_KEY:-SB-Mid-server-7Fp0W-6BPItzBeHc4WmVz0rh}
      MIDTRANS_CLIENT_KEY: ${MIDTRANS_CLIENT_KEY:-SB-Mid-client-VNwEU_8NEdo5N3og}
      MIDTRANS_IS_PRODUCTION: ${MIDTRANS_IS_PRODUCTION:-false}
      SMTP_HOST: ${SMTP_HOST:-smtp-relay.brevo.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      MAIL_SENDER: ${MAIL_SENDER:-Playfast <noreply@playfast.id>}
    networks:
      - playfast
    expose:
      - "5000"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NODE_ENV: production
      INTERNAL_API_URL: http://backend:5000
    networks:
      - playfast
    ports:
      - "127.0.0.1:3001:3000"

volumes:
  pgdata:

networks:
  playfast:
    driver: bridge
