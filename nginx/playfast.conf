server {
    listen 80;
    server_name playfast.andev.web.id;

    # Cloudflare handles SSL (proxied/orange cloud)
    # This block only serves HTTP — Cloudflare terminates TLS

    # 25M = 4 review photos × 5MB + form overhead. Backend per-file
    # validation still enforces 5MB cap; this is just the transport limit.
    client_max_body_size 25M;

    # User-uploaded files served directly by Flask. Bypassing Next.js
    # saves a hop on every <img> request. Backend is exposed on 5001
    # (container 5000 mapped via docker-compose).
    location /uploads/ {
        proxy_pass http://127.0.0.1:5001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    # Frontend (Next.js)
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
