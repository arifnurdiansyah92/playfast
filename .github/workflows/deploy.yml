name: Deploy to VPS

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          command_timeout: 30m
          script: |
            cd /opt/playfast

            # Backup database BEFORE any changes
            ./backup.sh

            # Pull latest
            git pull origin master

            # Free RAM: stop non-playfast containers during build
            OTHER_CONTAINERS=$(docker ps -q --filter "name=bpd-" --filter "name=nginapsini-" --filter "name=ielts-" 2>/dev/null)
            if [ -n "$OTHER_CONTAINERS" ]; then
              echo "Stopping other containers to free RAM..."
              docker stop $OTHER_CONTAINERS 2>/dev/null || true
            fi

            # Build (abort deploy if build fails)
            docker compose build || { echo "Build failed, aborting deploy"; exit 1; }

            # Restart WITHOUT -v (preserves data)
            docker compose down
            docker compose up -d

            # Restart other containers
            if [ -n "$OTHER_CONTAINERS" ]; then
              echo "Restarting other containers..."
              docker start $OTHER_CONTAINERS 2>/dev/null || true
            fi

            # Wait for DB
            sleep 8

            # Run migrations
            docker compose exec -T backend python -c "
            from app import create_app
            from app.extensions import db
            app = create_app()
            with app.app_context():
                db.create_all()
                print('DB migrated')
            "
            echo "Deployed at $(date)"
