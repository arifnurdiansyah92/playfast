<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Steam Desktop Authenticator</title>
<style>
  :root {
    --bg: #1b2838;
    --bg-card: #1e2a3a;
    --bg-input: #2a475e;
    --bg-overlay: rgba(0,0,0,0.6);
    --border: #3d5a80;
    --text: #c7d5e0;
    --text-dim: #8f98a0;
    --accent: #66c0f4;
    --accent-hover: #4db2e5;
    --green: #5ba32b;
    --green-hover: #4a8c23;
    --red: #c44;
    --code-bg: #171d25;
    --yellow: #e5c07b;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* Header */
  .header {
    background: linear-gradient(135deg, #171a21, #1b2838);
    border-bottom: 1px solid var(--border);
    padding: 16px 0;
  }
  .header-inner {
    max-width: 900px;
    margin: 0 auto;
    padding: 0 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .header h1 { font-size: 1.3rem; font-weight: 600; }
  .header h1 span { color: var(--accent); }
  .header-actions { display: flex; gap: 8px; }

  /* Toolbar */
  .toolbar {
    max-width: 900px;
    margin: 0 auto;
    padding: 16px 16px 0;
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
  }
  .search-box {
    flex: 1;
    min-width: 200px;
    position: relative;
  }
  .search-box input {
    width: 100%;
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 9px 12px 9px 36px;
    color: var(--text);
    font-size: 0.9rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-box input:focus { border-color: var(--accent); }
  .search-box input::placeholder { color: var(--text-dim); }
  .search-icon {
    position: absolute;
    left: 11px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-dim);
    font-size: 0.85rem;
    pointer-events: none;
  }
  .filter-info {
    font-size: 0.8rem;
    color: var(--yellow);
    padding: 6px 12px;
    background: rgba(229,192,123,0.1);
    border-radius: 4px;
    display: none;
    align-items: center;
    gap: 8px;
  }
  .filter-info.show { display: flex; }
  .filter-clear {
    cursor: pointer;
    color: var(--red);
    font-weight: 700;
    margin-left: 4px;
  }

  /* Container */
  .container {
    max-width: 900px;
    margin: 0 auto;
    padding: 16px;
  }

  .no-accounts {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-dim);
  }
  .no-accounts p { font-size: 1.1rem; }
  .no-accounts small { display: block; margin-top: 8px; font-size: 0.85rem; }

  /* Account card */
  .account-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 18px;
    margin-bottom: 12px;
    transition: border-color 0.2s;
  }
  .account-card:hover { border-color: var(--accent); }
  .account-card.hidden { display: none; }

  .account-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }
  .account-info h2 { font-size: 1.1rem; font-weight: 600; }
  .account-info .steam-id {
    color: var(--text-dim);
    font-size: 0.78rem;
    margin-top: 1px;
    font-family: monospace;
  }
  .account-meta {
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 0.8rem;
  }
  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    display: inline-block;
    margin-right: 4px;
  }
  .status-dot.saved { background: var(--green); }
  .status-dot.unsaved { background: var(--red); }
  .game-badge {
    color: var(--accent);
    font-size: 0.78rem;
    cursor: pointer;
  }
  .game-badge:hover { text-decoration: underline; }

  /* Code section */
  .code-section {
    background: var(--code-bg);
    border-radius: 6px;
    padding: 14px;
    margin-bottom: 12px;
    text-align: center;
  }
  .code-display {
    font-family: 'Consolas', 'Courier New', monospace;
    font-size: 2rem;
    font-weight: 700;
    letter-spacing: 6px;
    color: var(--accent);
    user-select: all;
    cursor: pointer;
    min-height: 40px;
    line-height: 40px;
  }
  .code-display.empty {
    color: var(--text-dim);
    font-size: 0.9rem;
    letter-spacing: normal;
  }
  .code-timer {
    margin-top: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .timer-bar {
    width: 180px; height: 3px;
    background: var(--bg-input);
    border-radius: 2px;
    overflow: hidden;
  }
  .timer-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 1s linear;
  }
  .timer-text { color: var(--text-dim); font-size: 0.75rem; min-width: 28px; }
  .copied-hint {
    font-size: 0.72rem;
    color: var(--green);
    margin-top: 3px;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .copied-hint.show { opacity: 1; }

  /* Password row */
  .password-section {
    display: flex;
    gap: 6px;
    margin-bottom: 10px;
    align-items: center;
  }
  .password-section input {
    flex: 1;
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 7px 10px;
    color: var(--text);
    font-size: 0.85rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .password-section input:focus { border-color: var(--accent); }
  .password-section input::placeholder { color: var(--text-dim); }

  /* Buttons */
  .btn {
    padding: 7px 14px;
    border: none;
    border-radius: 4px;
    font-size: 0.83rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-primary { background: var(--accent); color: #1b2838; }
  .btn-primary:hover:not(:disabled) { background: var(--accent-hover); }
  .btn-save { background: var(--green); color: #fff; }
  .btn-save:hover:not(:disabled) { background: var(--green-hover); }
  .btn-remove {
    background: transparent;
    color: var(--red);
    border: 1px solid var(--red);
    padding: 6px 13px;
  }
  .btn-remove:hover:not(:disabled) { background: rgba(204,68,68,0.15); }
  .btn-danger { background: var(--red); color: #fff; }
  .btn-danger:hover:not(:disabled) { background: #b33; }

  .actions { display: flex; gap: 6px; }
  .btn-code {
    flex: 1;
    background: var(--accent);
    color: #1b2838;
    padding: 9px;
    font-size: 0.9rem;
  }
  .btn-code:hover:not(:disabled) { background: var(--accent-hover); }
  .btn-login {
    flex: 1;
    background: var(--green);
    color: #fff;
    padding: 9px;
    font-size: 0.9rem;
  }
  .btn-login:hover:not(:disabled) { background: var(--green-hover); }
  .btn-games {
    flex: 1;
    background: var(--bg-input);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 9px;
    font-size: 0.9rem;
  }
  .btn-games:hover:not(:disabled) { background: #345; border-color: var(--accent); }
  .btn-sm { padding: 5px 10px; font-size: 0.78rem; }

  /* Games panel */
  .games-panel {
    margin-top: 10px;
    background: var(--code-bg);
    border-radius: 6px;
    padding: 12px;
    display: none;
  }
  .games-panel.open { display: block; }
  .games-search {
    width: 100%;
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 7px 10px;
    color: var(--text);
    font-size: 0.83rem;
    outline: none;
    margin-bottom: 8px;
  }
  .games-search:focus { border-color: var(--accent); }
  .games-search::placeholder { color: var(--text-dim); }
  .games-list {
    max-height: 240px;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }
  .game-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 5px 4px;
    font-size: 0.82rem;
    border-bottom: 1px solid rgba(61,90,128,0.3);
  }
  .game-item:last-child { border-bottom: none; }
  .game-icon {
    width: 32px; height: 32px;
    border-radius: 3px;
    background: var(--bg-input);
    flex-shrink: 0;
  }
  .game-name { flex: 1; }
  .game-time { color: var(--text-dim); font-size: 0.75rem; white-space: nowrap; }

  /* Modal */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: var(--bg-overlay);
    z-index: 900;
    display: none;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 24px;
    width: 440px;
    max-width: 95vw;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }
  .modal h2 { font-size: 1.15rem; margin-bottom: 16px; }
  .modal-field { margin-bottom: 14px; }
  .modal-field label {
    display: block;
    font-size: 0.83rem;
    color: var(--text-dim);
    margin-bottom: 5px;
  }
  .modal-field input[type="text"],
  .modal-field input[type="password"] {
    width: 100%;
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 9px 12px;
    color: var(--text);
    font-size: 0.9rem;
    outline: none;
  }
  .modal-field input:focus { border-color: var(--accent); }
  .modal-field input::placeholder { color: var(--text-dim); }

  /* File upload */
  .file-upload {
    border: 2px dashed var(--border);
    border-radius: 6px;
    padding: 20px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
  }
  .file-upload:hover { border-color: var(--accent); background: rgba(102,192,244,0.05); }
  .file-upload.has-file { border-color: var(--green); background: rgba(91,163,43,0.08); }
  .file-upload input {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
  }
  .file-upload-text { color: var(--text-dim); font-size: 0.88rem; }
  .file-upload-text strong { color: var(--accent); }
  .file-upload.has-file .file-upload-text { color: var(--green); }
  .file-name { font-size: 0.8rem; color: var(--text-dim); margin-top: 4px; }

  .modal-actions {
    display: flex;
    gap: 8px;
    justify-content: flex-end;
    margin-top: 18px;
  }
  .modal-actions .btn { padding: 9px 20px; font-size: 0.9rem; }
  .btn-ghost {
    background: transparent;
    color: var(--text-dim);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover { color: var(--text); border-color: var(--text-dim); }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    padding: 12px 20px;
    border-radius: 6px;
    font-size: 0.88rem;
    font-weight: 500;
    z-index: 1000;
    transform: translateY(100px);
    opacity: 0;
    transition: all 0.3s;
    max-width: 360px;
  }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.success { background: var(--green); color: #fff; }
  .toast.error { background: var(--red); color: #fff; }
  .toast.info { background: var(--accent); color: #1b2838; }

  .spinner {
    display: inline-block;
    width: 14px; height: 14px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    vertical-align: middle;
    margin-right: 5px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Account count */
  .account-count {
    font-size: 0.82rem;
    color: var(--text-dim);
    padding: 8px 0;
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <h1><span>Steam</span> Desktop Authenticator</h1>
    <div class="header-actions">
      <button class="btn btn-primary" onclick="openAddModal()">+ Add Account</button>
    </div>
  </div>
</div>

<div class="toolbar">
  <div class="search-box">
    <span class="search-icon">&#128269;</span>
    <input type="text" id="searchInput" placeholder="Search accounts or filter by game name..." oninput="onSearch()">
  </div>
  <button class="btn btn-games btn-sm" onclick="fetchAllGames()" id="fetchAllBtn">Fetch All Games</button>
</div>

<div class="toolbar">
  <div class="filter-info" id="filterInfo">
    <span id="filterText"></span>
    <span class="filter-clear" onclick="clearFilter()">&times; Clear</span>
  </div>
</div>

<div class="container" id="app">
  <div class="no-accounts"><p>Loading accounts...</p></div>
</div>

<!-- Add Account Modal -->
<div class="modal-overlay" id="addModal">
  <div class="modal">
    <h2>Add Steam Account</h2>
    <div class="modal-field">
      <label>Upload .mafile</label>
      <div class="file-upload" id="fileUpload">
        <input type="file" id="mafileInput" accept=".mafile" onchange="onFileSelect(this)">
        <div class="file-upload-text"><strong>Click to browse</strong> or drag & drop</div>
        <div class="file-name" id="fileName"></div>
      </div>
    </div>
    <div class="modal-field">
      <label>Password (optional — save for quick login)</label>
      <input type="password" id="addPassword" placeholder="Steam password">
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeAddModal()">Cancel</button>
      <button class="btn btn-save" id="addBtn" onclick="submitAdd()">Add Account</button>
    </div>
  </div>
</div>

<!-- Delete Confirm Modal -->
<div class="modal-overlay" id="deleteModal">
  <div class="modal">
    <h2>Delete Account</h2>
    <p style="margin-bottom:16px;color:var(--text-dim)">This will permanently delete the .mafile, saved password, and cached games for <strong id="deleteAcctName"></strong>.</p>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeDeleteModal()">Cancel</button>
      <button class="btn btn-danger" id="confirmDeleteBtn" onclick="confirmDelete()">Delete</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const appEl = document.getElementById('app');
const toastEl = document.getElementById('toast');
let accounts = [];
let allGames = {};  // account_name -> {games, game_count}
let codeTimers = {};
let gameFilter = '';
let deleteTarget = '';

// --- Toast ---
function showToast(msg, type = 'info') {
  toastEl.textContent = msg;
  toastEl.className = 'toast ' + type + ' show';
  clearTimeout(toastEl._t);
  toastEl._t = setTimeout(() => toastEl.classList.remove('show'), 3000);
}

// --- Escape ---
function esc(s) {
  const d = document.createElement('div');
  d.textContent = s || '';
  return d.innerHTML;
}

// --- Accounts ---
async function fetchAccounts() {
  const res = await fetch('/api/accounts');
  accounts = await res.json();
  render();
}

// --- Search / Filter ---
function onSearch() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();

  // If we have game data cached, check if the query matches a game name
  // and filter accounts to those that own that game
  if (q.length >= 2 && Object.keys(allGames).length > 0) {
    // Find accounts that own a game matching the query
    let matchedAccounts = new Set();
    let matchedGame = '';
    for (const [acctName, data] of Object.entries(allGames)) {
      for (const g of (data.games || [])) {
        if (g.name.toLowerCase().includes(q)) {
          matchedAccounts.add(acctName);
          if (!matchedGame) matchedGame = g.name;
        }
      }
    }
    if (matchedAccounts.size > 0) {
      gameFilter = q;
      const info = document.getElementById('filterInfo');
      document.getElementById('filterText').textContent =
        `Showing ${matchedAccounts.size} account(s) with games matching "${q}"`;
      info.classList.add('show');
      filterCards(matchedAccounts);
      return;
    }
  }

  // Fallback: filter by account name
  gameFilter = '';
  document.getElementById('filterInfo').classList.remove('show');
  document.querySelectorAll('.account-card').forEach(card => {
    const name = card.dataset.name || '';
    card.classList.toggle('hidden', q && !name.toLowerCase().includes(q));
  });
}

function clearFilter() {
  document.getElementById('searchInput').value = '';
  gameFilter = '';
  document.getElementById('filterInfo').classList.remove('show');
  document.querySelectorAll('.account-card').forEach(c => c.classList.remove('hidden'));
}

function filterCards(matchedSet) {
  document.querySelectorAll('.account-card').forEach(card => {
    card.classList.toggle('hidden', !matchedSet.has(card.dataset.name));
  });
}

// --- Render ---
function render() {
  if (!accounts.length) {
    appEl.innerHTML = `
      <div class="no-accounts">
        <p>No accounts yet</p>
        <small>Click "+ Add Account" to import a .mafile</small>
      </div>`;
    return;
  }

  const countEl = `<div class="account-count">${accounts.length} account(s)</div>`;

  appEl.innerHTML = countEl + accounts.map((a, i) => `
    <div class="account-card" data-name="${esc(a.account_name)}" id="card-${i}">
      <div class="account-header">
        <div class="account-info">
          <h2>${esc(a.account_name)}</h2>
          <div class="steam-id">${esc(a.steam_id)} &middot; ${esc(a.mafile)}</div>
        </div>
        <div class="account-meta">
          ${a.games_fetched ? `<span class="game-badge" onclick="toggleGames(${i})">${a.game_count} games</span>` : ''}
          <span><span class="status-dot ${a.has_password ? 'saved' : 'unsaved'}"></span>${a.has_password ? 'Saved' : 'No pw'}</span>
          <button class="btn btn-remove btn-sm" onclick="openDeleteModal('${esc(a.account_name)}')" title="Delete account">&#128465;</button>
        </div>
      </div>

      <div class="code-section">
        <div class="code-display empty" id="code-${i}" onclick="copyCode(${i})">Click "Get Code" to generate</div>
        <div class="code-timer" id="timer-${i}" style="display:none">
          <div class="timer-bar"><div class="timer-fill" id="fill-${i}"></div></div>
          <span class="timer-text" id="remaining-${i}">30s</span>
        </div>
        <div class="copied-hint" id="copied-${i}">Copied to clipboard!</div>
      </div>

      <div class="password-section">
        <input type="password" id="pw-${i}" placeholder="Steam password"
               value="${a.has_password ? '--------' : ''}"
               onfocus="if(this.value==='--------')this.value=''">
        <button class="btn btn-save btn-sm" onclick="savePassword(${i})">Save</button>
        ${a.has_password ? `<button class="btn btn-remove btn-sm" onclick="removePassword(${i})">Remove</button>` : ''}
      </div>

      <div class="actions">
        <button class="btn btn-code" id="codebtn-${i}" onclick="getCode(${i})">Get Code</button>
        <button class="btn btn-login" id="loginbtn-${i}" onclick="doLogin(${i})">Login</button>
        <button class="btn btn-games" id="gamesbtn-${i}" onclick="fetchGames(${i})">Games</button>
      </div>

      <div class="games-panel" id="games-${i}">
        <input class="games-search" placeholder="Search games..." oninput="filterGamesPanel(${i}, this.value)">
        <div class="games-list" id="gameslist-${i}"></div>
      </div>
    </div>
  `).join('');

  // Re-apply search filter if active
  const q = document.getElementById('searchInput').value.trim();
  if (q) onSearch();
}

// --- Password ---
async function savePassword(idx) {
  const a = accounts[idx];
  const pw = document.getElementById('pw-' + idx).value;
  if (!pw || pw === '--------') { showToast('Enter a password first', 'error'); return; }
  const res = await fetch('/api/save-password', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({account_name: a.account_name, password: pw}),
  });
  if (res.ok) {
    showToast('Password saved', 'success');
    accounts[idx].has_password = true;
    render();
  } else {
    showToast('Failed to save', 'error');
  }
}

async function removePassword(idx) {
  const a = accounts[idx];
  await fetch('/api/remove-password', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({account_name: a.account_name}),
  });
  showToast('Password removed', 'info');
  accounts[idx].has_password = false;
  render();
}

// --- Code ---
async function getCode(idx) {
  const a = accounts[idx];
  const btn = document.getElementById('codebtn-' + idx);
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>...';
  try {
    const res = await fetch('/api/code/' + encodeURIComponent(a.account_name));
    const data = await res.json();
    if (data.error) { showToast(data.error, 'error'); return; }
    const codeEl = document.getElementById('code-' + idx);
    codeEl.textContent = data.code;
    codeEl.classList.remove('empty');
    document.getElementById('timer-' + idx).style.display = 'flex';
    startTimer(idx, data.remaining);
  } catch { showToast('Error generating code', 'error'); }
  finally { btn.disabled = false; btn.textContent = 'Get Code'; }
}

function startTimer(idx, remaining) {
  if (codeTimers[idx]) clearInterval(codeTimers[idx]);
  let secs = remaining;
  updateTimerUI(idx, secs);
  codeTimers[idx] = setInterval(() => {
    secs--;
    if (secs <= 0) { getCode(idx); return; }
    updateTimerUI(idx, secs);
  }, 1000);
}

function updateTimerUI(idx, secs) {
  const fill = document.getElementById('fill-' + idx);
  const text = document.getElementById('remaining-' + idx);
  if (fill) fill.style.width = ((secs / 30) * 100) + '%';
  if (text) text.textContent = secs + 's';
}

function copyCode(idx) {
  const codeEl = document.getElementById('code-' + idx);
  if (!codeEl || codeEl.classList.contains('empty')) return;
  navigator.clipboard.writeText(codeEl.textContent).then(() => {
    const h = document.getElementById('copied-' + idx);
    h.classList.add('show');
    setTimeout(() => h.classList.remove('show'), 1500);
  });
}

// --- Login ---
async function doLogin(idx) {
  const a = accounts[idx];
  const btn = document.getElementById('loginbtn-' + idx);
  const pwInput = document.getElementById('pw-' + idx);
  const pw = (pwInput.value && pwInput.value !== '--------') ? pwInput.value : '';
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>...';
  try {
    const res = await fetch('/api/login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({account_name: a.account_name, password: pw}),
    });
    const data = await res.json();
    showToast(data.success ? data.message : (data.error || 'Login failed'), data.success ? 'success' : 'error');
  } catch { showToast('Network error', 'error'); }
  finally { btn.disabled = false; btn.textContent = 'Login'; }
}

// --- Games ---
async function fetchGames(idx) {
  const a = accounts[idx];
  const btn = document.getElementById('gamesbtn-' + idx);
  const panel = document.getElementById('games-' + idx);

  // Toggle if already open with data
  if (panel.classList.contains('open') && document.getElementById('gameslist-' + idx).children.length > 0) {
    panel.classList.remove('open');
    return;
  }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Loading...';
  try {
    const res = await fetch('/api/games/' + encodeURIComponent(a.account_name));
    const data = await res.json();
    if (data.error) { showToast(data.error, 'error'); return; }

    allGames[a.account_name] = {games: data.games, game_count: data.game_count};
    accounts[idx].games_fetched = true;
    accounts[idx].game_count = data.game_count;

    renderGamesPanel(idx, data.games);
    panel.classList.add('open');
    showToast(`${data.game_count} games loaded${data.cached ? ' (cached)' : ''}`, 'info');
  } catch { showToast('Error fetching games', 'error'); }
  finally { btn.disabled = false; btn.textContent = 'Games'; }
}

function toggleGames(idx) {
  const panel = document.getElementById('games-' + idx);
  const a = accounts[idx];
  if (panel.classList.contains('open')) {
    panel.classList.remove('open');
  } else if (allGames[a.account_name]) {
    renderGamesPanel(idx, allGames[a.account_name].games);
    panel.classList.add('open');
  } else {
    fetchGames(idx);
  }
}

function renderGamesPanel(idx, games) {
  const list = document.getElementById('gameslist-' + idx);
  list.innerHTML = games.map(g => {
    const hrs = g.playtime > 0 ? (g.playtime / 60).toFixed(1) + ' hrs' : 'Never played';
    const iconUrl = g.icon ? `https://media.steampowered.com/steamcommunity/public/images/apps/${g.appid}/${g.icon}.jpg` : '';
    return `<div class="game-item" data-gname="${esc(g.name.toLowerCase())}">
      ${iconUrl ? `<img class="game-icon" src="${iconUrl}" alt="">` : '<div class="game-icon"></div>'}
      <span class="game-name">${esc(g.name)}</span>
      <span class="game-time">${hrs}</span>
    </div>`;
  }).join('');
}

function filterGamesPanel(idx, q) {
  q = q.toLowerCase();
  document.querySelectorAll('#gameslist-' + idx + ' .game-item').forEach(el => {
    el.style.display = el.dataset.gname.includes(q) ? '' : 'none';
  });
}

async function fetchAllGames() {
  const btn = document.getElementById('fetchAllBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Fetching...';

  let done = 0;
  for (const a of accounts) {
    try {
      const res = await fetch('/api/games/' + encodeURIComponent(a.account_name));
      const data = await res.json();
      if (!data.error) {
        allGames[a.account_name] = {games: data.games, game_count: data.game_count};
        const idx = accounts.findIndex(x => x.account_name === a.account_name);
        if (idx >= 0) {
          accounts[idx].games_fetched = true;
          accounts[idx].game_count = data.game_count;
        }
      }
      done++;
    } catch { done++; }
  }

  render();
  btn.disabled = false;
  btn.textContent = 'Fetch All Games';
  showToast(`Games fetched for ${done} account(s)`, 'success');
}

// --- Add Account Modal ---
function openAddModal() {
  document.getElementById('addModal').classList.add('show');
  document.getElementById('mafileInput').value = '';
  document.getElementById('addPassword').value = '';
  document.getElementById('fileUpload').classList.remove('has-file');
  document.getElementById('fileName').textContent = '';
}

function closeAddModal() {
  document.getElementById('addModal').classList.remove('show');
}

function onFileSelect(input) {
  const file = input.files[0];
  if (file) {
    document.getElementById('fileUpload').classList.add('has-file');
    document.getElementById('fileName').textContent = file.name;
    document.querySelector('#fileUpload .file-upload-text').innerHTML = '<strong>File selected</strong>';
  }
}

async function submitAdd() {
  const fileInput = document.getElementById('mafileInput');
  const password = document.getElementById('addPassword').value;
  const btn = document.getElementById('addBtn');

  if (!fileInput.files.length) {
    showToast('Please select a .mafile', 'error');
    return;
  }

  const fd = new FormData();
  fd.append('mafile', fileInput.files[0]);
  if (password) fd.append('password', password);

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Adding...';

  try {
    const res = await fetch('/api/accounts/add', { method: 'POST', body: fd });
    const data = await res.json();
    if (data.success) {
      showToast(data.message, 'success');
      closeAddModal();
      fetchAccounts();
    } else {
      showToast(data.error || 'Failed to add account', 'error');
    }
  } catch { showToast('Network error', 'error'); }
  finally { btn.disabled = false; btn.textContent = 'Add Account'; }
}

// --- Delete Modal ---
function openDeleteModal(name) {
  deleteTarget = name;
  document.getElementById('deleteAcctName').textContent = name;
  document.getElementById('deleteModal').classList.add('show');
}

function closeDeleteModal() {
  document.getElementById('deleteModal').classList.remove('show');
  deleteTarget = '';
}

async function confirmDelete() {
  const btn = document.getElementById('confirmDeleteBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Deleting...';
  try {
    const res = await fetch('/api/accounts/delete', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({account_name: deleteTarget}),
    });
    const data = await res.json();
    if (data.success) {
      showToast('Account deleted', 'info');
      delete allGames[deleteTarget];
      closeDeleteModal();
      fetchAccounts();
    } else {
      showToast(data.error || 'Failed', 'error');
    }
  } catch { showToast('Network error', 'error'); }
  finally { btn.disabled = false; btn.textContent = 'Delete'; }
}

// Close modals on overlay click
document.getElementById('addModal').addEventListener('click', e => {
  if (e.target === document.getElementById('addModal')) closeAddModal();
});
document.getElementById('deleteModal').addEventListener('click', e => {
  if (e.target === document.getElementById('deleteModal')) closeDeleteModal();
});

// Load cached games on startup
async function loadCachedGames() {
  try {
    const res = await fetch('/api/games/all');
    allGames = await res.json();
  } catch {}
}

// Init
Promise.all([fetchAccounts(), loadCachedGames()]);
</script>
</body>
</html>
